{% extends "base.html" %}

{% block header %}
<style>
  #announcement-bar {
    background: #1a1a2e;
    color: #fff;
    text-align: center;
    padding: 10px 40px;
    font-size: 14px;
    position: relative;
    display: none; /* hidden by default, JS will show it */
  }

  #announcement-bar a {
    color: #1da1f2;
    text-decoration: none;
  }

  #close-btn {
    position: absolute;
    right: 16px;
    top: 50%;
    transform: translateY(-50%);
    background: none;
    border: none;
    color: #fff;
    font-size: 18px;
    cursor: pointer;
  }
</style>

<div id="announcement-bar">
  For updates follow <a href="https://x.com/Shriramthebeast" target="_blank"><strong>@Shriramthebeast</strong></a> on 𝕏 
  &nbsp;&nbsp;|&nbsp;&nbsp; 
  New Feature: <a href="{{ 'dsa-patterns/' | url }}" style="text-decoration: underline; font-weight: bold;">DSA Patterns Study Guide</a>
  <button id="close-btn" onclick="closeBar()">✕</button>
</div>

<script>
  // On page load, check if user already closed it
  if (!localStorage.getItem('barClosed')) {
    document.getElementById('announcement-bar').style.display = 'block';
  }

  function closeBar() {
    document.getElementById('announcement-bar').style.display = 'none';
    localStorage.setItem('barClosed', 'true'); // remember it was closed
  }
</script>
{{ super() }}
{% endblock %}
